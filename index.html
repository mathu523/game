<!DOCTYPE html>
<html>

<head>

    <title>Face Puzzle Game</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

    <h1>🧩 Face-Aware Smart Puzzle</h1>

    <p>Capture image and solve the puzzle</p>

    <!-- CAMERA -->

    <div class="camera-section">

        <video id="video"
               autoplay>
        </video>

        <br><br>

        <button onclick="captureImage()">
            📸 Capture Image
        </button>

    </div>

    <canvas id="canvas"
            width="320"
            height="240"
            style="display:none;">
    </canvas>

    <!-- TOP BAR -->

    <div class="top-bar">

        <div class="info">

            ⏱️ Time:
            <span id="timer">0</span>s

            &nbsp;&nbsp;

            🔄 Moves:
            <span id="moves">0</span>

        </div>

        <button class="reset-btn"
                onclick="resetPuzzle()">

            Reset
        </button>

    </div>

    <!-- MAIN -->

    <div class="main-container">

        <!-- LEFT -->

        <div class="panel">

            <h2>🧩 Puzzle Pieces</h2>

            <div id="pieces-container"></div>

        </div>

        <!-- RIGHT -->

        <div class="panel">

            <h2>✅ Solve Here</h2>

            <div id="board-container"></div>

        </div>

    </div>

    <div id="message"></div>

    <script src="{{ url_for('static',
            filename='script.js') }}"></script>

</body>

</html>
